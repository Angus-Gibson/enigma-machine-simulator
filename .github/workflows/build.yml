name: Build Windows Executable

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Explicit minimum permissions — anything not listed defaults to none when a
# permissions block is present, but spelling them out makes the security
# posture visible to reviewers without needing to know GitHub's defaults.
permissions:
  contents: write       # required: create release tags and upload .exe assets
  actions: none
  checks: none
  deployments: none
  id-token: none
  issues: none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  build:
    name: PyInstaller → EnigmaMachineSimulator.exe
    runs-on: windows-latest

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      # fetch-depth: 0 fetches the full history and all tags so the semver step
      # can find the latest release tag.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── 2. Semantic version ───────────────────────────────────────────────────
      # Skipped on non-main branches; outputs are unused by later if: conditions.
      # Reads the HEAD commit message, classifies it against Conventional Commits,
      # finds the latest vX.Y.Z tag, and computes the next version.
      #
      # Rules (highest-priority match wins):
      #   BREAKING CHANGE: in body  →  major bump
      #   type(scope)!: …           →  major bump  (! after type or scope)
      #   feat(scope)?: …           →  minor bump
      #   fix(scope)?: …            →  patch bump
      #   anything else             →  patch bump  (fallback)
      - name: Calculate next semantic version
        id: semver
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          # Full commit message (subject + body)
          $msg = git log -1 --pretty=%B

          # ── Classify bump type ───────────────────────────────────────────────
          $bump = 'patch'   # default fallback for non-Conventional Commits

          if (($msg -match '(?m)^BREAKING CHANGE:') -or
              ($msg -match '(?m)^\w+(\([^)]*\))?!:')) {
            $bump = 'major'
          } elseif ($msg -match '(?m)^feat(\([^)]*\))?:') {
            $bump = 'minor'
          } elseif ($msg -match '(?m)^fix(\([^)]*\))?:') {
            $bump = 'patch'
          }

          # ── Find latest semver tag ───────────────────────────────────────────
          $tags   = git tag --sort=-version:refname |
                      Where-Object { $_ -match '^v\d+\.\d+\.\d+$' }
          $latest = if ($tags) { $tags | Select-Object -First 1 } else { 'v0.0.0' }

          # ── Compute next version ─────────────────────────────────────────────
          $parts = $latest.TrimStart('v').Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++; $patch = 0 }
            'patch' { $patch++ }
          }

          $next = "v$major.$minor.$patch"

          Write-Host "Previous tag : $latest"
          Write-Host "Bump type    : $bump"
          Write-Host "Next version : $next"

          "version=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bump=$bump"    | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "previous=$latest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 3. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 4. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller flake8 black pytest

      # ── 5. Test ───────────────────────────────────────────────────────────────
      # Runs before lint and build.  A test failure blocks the entire pipeline
      # so no executable is published from a broken cipher implementation.
      - name: Run pytest
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest tests/ -v

      # ── 6. Lint ───────────────────────────────────────────────────────────────
      # Runs before the PyInstaller build so style/import errors are caught early.
      # black --check:  fails if any file would be reformatted (zero changes = pass).
      # flake8:         enforces PEP 8 with project-specific overrides in .flake8.
      - name: Lint (black + flake8)
        run: |
          black --check main.py enigma_core.py sound_manager.py
          flake8 main.py enigma_core.py sound_manager.py

      # ── 7. Build ─────────────────────────────────────────────────────────────
      # SDL_VIDEODRIVER=dummy  — headless display driver; pygame never tries to
      #                          open a real window during PyInstaller analysis.
      # SDL_AUDIODRIVER=dummy  — prevents mixer-init failures on the runner.
      # These vars are build-time only; the shipped .exe ignores them on the
      # user's real Windows machine.
      - name: Build executable with PyInstaller
        if: github.ref == 'refs/heads/main'
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pyinstaller EnigmaMachineSimulator.spec

      # ── 8. Rename with version ────────────────────────────────────────────────
      # Move-Item is used instead of Rename-Item because Rename-Item's -NewName
      # parameter rejects values that contain path separators — it expects a bare
      # filename only.  Move-Item accepts full paths for both arguments.
      - name: Rename executable with version
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = "${{ steps.semver.outputs.version }}".Trim()
          $src = "dist\EnigmaMachineSimulator.exe"
          $dst = "dist\EnigmaMachineSimulator-$version.exe"
          Move-Item -Path $src -Destination $dst
          $mb = [math]::Round((Get-Item $dst).Length / 1MB, 1)
          Write-Host "✓ EnigmaMachineSimulator-$version.exe — $mb MB"

      # ── 9. Changelog ──────────────────────────────────────────────────────────
      # Categorises every commit since the previous release tag into labelled
      # sections using Conventional Commit prefixes, then writes a complete
      # release body to release_body.md for use by the Create Release step.
      #
      # Category rules (first match wins; test: and unknown prefixes omitted):
      #   fix(security): / chore(security):  → 🔒 Security
      #   feat(…)?(!)?:                       → 🎛️ New Features
      #   fix(…)?(!)?:                        → 🐛 Bug Fixes
      #   chore(deps…):                       → 📦 Dependencies
      #   chore(…)?: / ci(…)?:               → 🏗️ Pipeline & Infrastructure
      #   docs(…)?:                           → 📝 Documentation
      #   refactor(…)?: / style(…)?:         → 🎨 Code Quality
      - name: Build changelog
        id: changelog
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $previous = "${{ steps.semver.outputs.previous }}"
          $version  = "${{ steps.semver.outputs.version }}"
          $sha      = "${{ github.sha }}"
          $short    = $sha.Substring(0, 7)
          $repoUrl  = "${{ github.server_url }}/${{ github.repository }}"
          $bump     = "${{ steps.semver.outputs.bump }}"
          $branch   = "${{ github.ref_name }}"

          # ── Section builder ─────────────────────────────────────────────────
          function Make-Section {
              param($Title, $Items)
              if ($null -eq $Items -or @($Items).Count -eq 0) { return "" }
              return "### $Title`n" + (@($Items) -join "`n") + "`n`n"
          }

          # ── Collect commits since previous tag ──────────────────────────────
          # v0.0.0 is the sentinel used when no prior tag exists — log all history.
          if ($previous -eq 'v0.0.0') {
              $rawCommits = git log HEAD --pretty=format:"%H %s" --no-merges
          } else {
              $rawCommits = git log "$previous..HEAD" --pretty=format:"%H %s" --no-merges
          }

          # ── Category buckets ────────────────────────────────────────────────
          $feat = @(); $fix = @(); $sec = @()
          $deps = @(); $ci  = @(); $docs = @(); $qual = @()

          foreach ($line in $rawCommits) {
              if ([string]::IsNullOrWhiteSpace($line) -or $line.Length -le 41) { continue }
              $cSha  = $line.Substring(0, 40)
              $subj  = $line.Substring(41).Trim()
              $cShrt = $cSha.Substring(0, 7)
              $entry = "- [``$cShrt``]($repoUrl/commit/$cSha) $subj"

              if     ($subj -match '^(fix|chore)\(security\):')      { $sec  += $entry }
              elseif ($subj -match '^feat(\([^)]*\))?(!)?:')          { $feat += $entry }
              elseif ($subj -match '^fix(\([^)]*\))?(!)?:')           { $fix  += $entry }
              elseif ($subj -match '^chore\(deps[^)]*\):')            { $deps += $entry }
              elseif ($subj -match '^(chore|ci)(\([^)]*\))?:')       { $ci   += $entry }
              elseif ($subj -match '^docs(\([^)]*\))?:')              { $docs += $entry }
              elseif ($subj -match '^(refactor|style)(\([^)]*\))?:') { $qual += $entry }
              # test: and unrecognised prefixes are intentionally omitted
          }

          # ── Build categorised changelog ─────────────────────────────────────
          $cl  = Make-Section "🎛️ New Features"              $feat
          $cl += Make-Section "🐛 Bug Fixes"                 $fix
          $cl += Make-Section "🔒 Security"                  $sec
          $cl += Make-Section "📦 Dependencies"              $deps
          $cl += Make-Section "🏗️ Pipeline & Infrastructure" $ci
          $cl += Make-Section "📝 Documentation"             $docs
          $cl += Make-Section "🎨 Code Quality"              $qual

          if ([string]::IsNullOrWhiteSpace($cl)) {
              $cl = "_No categorised changes in this release._`n`n"
          }

          # ── Assemble full release body ──────────────────────────────────────
          # Build as a list of lines then join, to avoid PowerShell here-string
          # indentation constraints inside YAML block scalars.
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("## Enigma Machine Simulator $version")
          $lines.Add("")
          $lines.Add("| | |")
          $lines.Add("|---|---|")
          $lines.Add("| **Version** | ``$version`` |")
          $lines.Add("| **Previous** | ``$previous`` |")
          $lines.Add("| **Bump type** | ``$bump`` |")
          $lines.Add("| **Commit** | [``$short``]($repoUrl/commit/$sha) |")
          $lines.Add("| **Branch** | ``$branch`` |")
          $lines.Add("")
          $lines.Add("## What's Changed")
          $lines.Add("")
          $lines.Add($cl.TrimEnd())
          $lines.Add("")
          $lines.Add("### Download")
          $lines.Add("**``EnigmaMachineSimulator-$version.exe``** — self-contained Windows executable.")
          $lines.Add("No Python installation required. Double-click to run.")

          ($lines -join "`n") | Out-File -FilePath "release_body.md" -Encoding utf8
          Write-Host "Changelog written — $(@($rawCommits).Count) commit(s) examined"

      # ── 10. Release ───────────────────────────────────────────────────────────
      # Only reached on main when all prior steps succeed.
      # body_path reads the release body written by the changelog step above.
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: "Enigma Machine Simulator ${{ steps.semver.outputs.version }}"
          body_path: release_body.md
          files: dist/EnigmaMachineSimulator-${{ steps.semver.outputs.version }}.exe
          make_latest: true
          generate_release_notes: false
