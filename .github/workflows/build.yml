name: Build Windows Executable

on:
  push:
    branches: [main]

# Write permission is required to create releases and tags.
permissions:
  contents: write

jobs:
  build:
    name: PyInstaller → EnigmaMachineSimulator.exe
    runs-on: windows-latest

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      # fetch-depth: 0 fetches the full history and all tags so the semver step
      # can find the latest release tag.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Semantic version ───────────────────────────────────────────────────
      # Reads the HEAD commit message, classifies it against Conventional Commits,
      # finds the latest vX.Y.Z tag, and computes the next version.
      #
      # Rules (highest-priority match wins):
      #   BREAKING CHANGE: in body  →  major bump
      #   type(scope)!: …           →  major bump  (! after type or scope)
      #   feat(scope)?: …           →  minor bump
      #   fix(scope)?: …            →  patch bump
      #   anything else             →  patch bump  (fallback)
      - name: Calculate next semantic version
        id: semver
        shell: pwsh
        run: |
          # Full commit message (subject + body)
          $msg = git log -1 --pretty=%B

          # ── Classify bump type ───────────────────────────────────────────────
          $bump = 'patch'   # default fallback for non-Conventional Commits

          if (($msg -match '(?m)^BREAKING CHANGE:') -or
              ($msg -match '(?m)^\w+(\([^)]*\))?!:')) {
            $bump = 'major'
          } elseif ($msg -match '(?m)^feat(\([^)]*\))?:') {
            $bump = 'minor'
          } elseif ($msg -match '(?m)^fix(\([^)]*\))?:') {
            $bump = 'patch'
          }

          # ── Find latest semver tag ───────────────────────────────────────────
          $tags   = git tag --sort=-version:refname |
                      Where-Object { $_ -match '^v\d+\.\d+\.\d+$' }
          $latest = if ($tags) { $tags | Select-Object -First 1 } else { 'v0.0.0' }

          # ── Compute next version ─────────────────────────────────────────────
          $parts = $latest.TrimStart('v').Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++; $patch = 0 }
            'patch' { $patch++ }
          }

          $next = "v$major.$minor.$patch"

          Write-Host "Previous tag : $latest"
          Write-Host "Bump type    : $bump"
          Write-Host "Next version : $next"

          "version=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bump=$bump"    | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "previous=$latest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 3. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 4. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install pygame numpy Pillow pyinstaller

      # ── 5. Build ──────────────────────────────────────────────────────────────
      # SDL_VIDEODRIVER=dummy  — headless display driver; pygame never tries to
      #                          open a real window during PyInstaller analysis.
      # SDL_AUDIODRIVER=dummy  — prevents mixer-init failures on the runner.
      # These vars are build-time only; the shipped .exe ignores them on the
      # user's real Windows machine.
      - name: Build executable with PyInstaller
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pyinstaller EnigmaMachineSimulator.spec

      # ── 6. Rename with version ────────────────────────────────────────────────
      - name: Rename executable with version
        shell: pwsh
        run: |
          $version = "${{ steps.semver.outputs.version }}"
          $src = "dist\EnigmaMachineSimulator.exe"
          $dst = "dist\EnigmaMachineSimulator-$version.exe"
          Rename-Item $src $dst
          $mb = [math]::Round((Get-Item $dst).Length / 1MB, 1)
          Write-Host "✓ EnigmaMachineSimulator-$version.exe — $mb MB"

      # ── 7. Release ────────────────────────────────────────────────────────────
      # Only reached when all prior steps succeed — failures short-circuit the job.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: "Enigma Machine Simulator ${{ steps.semver.outputs.version }}"
          body: |
            ## Enigma Machine Simulator ${{ steps.semver.outputs.version }}

            | | |
            |---|---|
            | **Version** | `${{ steps.semver.outputs.version }}` |
            | **Previous** | `${{ steps.semver.outputs.previous }}` |
            | **Bump type** | `${{ steps.semver.outputs.bump }}` |
            | **Commit** | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | **Branch** | `${{ github.ref_name }}` |

            ### Download
            **`EnigmaMachineSimulator-${{ steps.semver.outputs.version }}.exe`** — self-contained Windows executable.
            No Python installation required. Double-click to run.
          files: dist/EnigmaMachineSimulator-${{ steps.semver.outputs.version }}.exe
          make_latest: true
          generate_release_notes: false
